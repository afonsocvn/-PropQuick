<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #e0e0e0;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .document {
            width: 595px;
            background: white;
            /* Simulate A4 pages visually by masking out the gaps */
            -webkit-mask-image: repeating-linear-gradient(to bottom, black 0px, black 842px, transparent 842px, transparent 874px);
            mask-image: repeating-linear-gradient(to bottom, black 0px, black 842px, transparent 842px, transparent 874px);

            /* We want a shadow on EVERY page. filter: drop-shadow follows the mask! */
            filter: drop-shadow(0px 10px 15px rgba(0, 0, 0, 0.2));
        }

        /* Actually, wait: background is continuous white?
     If the background is white on the container, the drop-shadow will be on the edge of the mask!
     This perfectly simulates multiple A4 pages stacked with gaps!
  */

        .content {
            padding: 60px;
            font-family: sans-serif;
        }

        p {
            line-height: 1.6;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="document">
        <div class="content">
            <h1>WYSIWYG Paginator</h1>
            <p>This is a test to see if a single HTML div can be made to look like multiple distinct A4 pages.</p>
            <div style="height: 600px; background: #ffebee;">Tall block 1</div>
            <div style="height: 400px; background: #e8f5e9;">Tall block 2 (Spans the gap)</div>
            <div style="height: 300px; background: #e3f2fd;">Tall block 3</div>
        </div>
    </div>
</body>

</html>
